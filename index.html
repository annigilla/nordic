<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027 北歐親子極光之旅 </title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --money: #27ae60; --child: #e67e22; --danger: #ff4757; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; color: #333; }
        header { background: linear-gradient(135deg, #1a2a6c, #b21f1f); color: white; text-align: center; padding: 20px 10px; }
        
        /* 導覽分頁 */
        .nav-tabs { display: flex; background: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 15px 5px; border: none; background: none; font-size: 1em; font-weight: bold; cursor: pointer; color: #777; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        .container { max-width: 950px; margin: 20px auto; padding: 0 15px; display: none; }
        .container.active { display: block; }

        /* 行程卡片 */
        .card { background: white; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; }
        .card-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; background: #fff; border-bottom: 1px solid #eee; }
        .card-header.active { background: var(--accent); color: white; }
        .card-content { display: none; padding: 20px; background: #fff; }
        .section-title { font-weight: bold; color: var(--accent); margin-top: 10px; margin-bottom: 5px; font-size: 0.9em; }
        
        /* 編輯區與固定區 */
        .editable-feature { background: #fffcf0; padding: 10px; border-radius: 5px; border: 1px dashed #f1c40f; outline: none; line-height: 1.6; }
        .fixed-info { background: #f8f9fa; padding: 10px; border-radius: 5px; font-size: 0.9em; color: #555; white-space: pre-line; }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; background: white; margin-bottom: 10px; font-size: 0.85em; }
        th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        input, select { padding: 5px; border: 1px solid #ddd; border-radius: 4px; width: 90%; background: #fffcf0; }

        /* 總額顯示 */
        .summary-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .summary-card { flex: 1; background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* 記帳卡片 */
        .balance-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .balance-card { background: white; padding: 15px; border-radius: 10px; text-align: center; border-top: 4px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* 按鈕 */
        .btn-save { background: #2ecc71; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 1.1em; cursor: pointer; position: fixed; bottom: 20px; right: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; font-weight: bold; }
        .btn-add { background: var(--money); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }

        @media (max-width: 600px) { th, td { padding: 6px 4px; font-size: 0.75em; } }
    </style>
</head>

// --- 3. 雲端讀取 ---
let cloudData = { eurRate: 35.5, features: {}, trans: [], stay: [], ledger: [] };

function loadFromCloud() {
    db.ref("trip_v4").once("value").then((snapshot) => {
        if (snapshot.exists()) cloudData = snapshot.val();
        renderItinerary();
        renderBudget();
        renderLedger();
        document.getElementById('status-msg').innerText = "✅ 雲端同步中";
    });
}

// --- 4. 渲染功能 ---
function renderItinerary() {
    const list = document.getElementById('itinerary-list');
    list.innerHTML = "";
    staticItinerary.forEach((item, idx) => {
        const feat = cloudData.features ? cloudData.features['day'+idx] : item.f;
        list.innerHTML += `
            <div class="card">
                <div class="card-header" onclick="toggleCard(this)">
                    <span>${item.d} | ${item.t}</span><span>▼</span>
                </div>
                <div class="card-content">
                    <div class="section-title">📜 行程特色 </div>
                    <div class="editable-feature" contenteditable="true" id="feat-${idx}">${feat || item.f}</div>
                    <div class="section-title">✈️ 交通銜接 </div>
                    <div class="fixed-info">${item.tr}</div>
                    <div class="section-title">🏨 住宿預定 </div>
                    <div class="fixed-info">${item.h}</div>
                </div>
            </div>`;
    });
}

function renderBudget() {
    document.getElementById('eur-rate').value = cloudData.eurRate || 35.5;
    const tBody = document.getElementById('trans-body');
    tBody.innerHTML = "";
    if (cloudData.trans) cloudData.trans.forEach(i => addTransRow(i.n, i.a, i.c, i.u));
    else {
        addTransRow("國際機票 (Emirates)", 42142, 33714, "TWD");
        addTransRow("內陸航段 (2段)", 11627, 9226, "TWD");
    }

    const sBody = document.getElementById('stay-body');
    sBody.innerHTML = "";
    if (cloudData.stay) cloudData.stay.forEach(i => addStayRow(i.n, i.v, i.u));
    else {
        addStayRow("Santa Claus Village", 7485, "EUR");
        addStayRow("Helsinki Airbnb 合計", 1500, "TWD");
        addStayRow("Copenhagen Airbnb 合計", 1500, "TWD");
        addStayRow("Stockholm Airbnb 合計", 1500, "TWD");
    }
    calculateBudget();
}

function addTransRow(n="", a=0, c=0, u="TWD") {
    const row = document.createElement('tr');
    row.innerHTML = `
        <td><input class="t-name" value="${n}"></td>
        <td><input type="number" class="t-adult" value="${a}" oninput="calculateBudget()"></td>
        <td><input type="number" class="t-child" value="${c}" oninput="calculateBudget()"></td>
        <td><select class="t-unit" onchange="calculateBudget()"><option value="TWD" ${u==='TWD'?'selected':''}>TWD</option><option value="EUR" ${u==='EUR'?'selected':''}>EUR</option></select></td>
        <td><button class="btn-del" onclick="this.parentElement.parentElement.remove();calculateBudget()">X</button></td>`;
    document.getElementById('trans-body').appendChild(row);
}

function addStayRow(n="", v=0, u="EUR") {
    const row = document.createElement('tr');
    row.innerHTML = `
        <td><input class="s-name" value="${n}"></td>
        <td><input type="number" class="s-cost" value="${v}" oninput="calculateBudget()"></td>
        <td><select class="s-unit" onchange="calculateBudget()"><option value="EUR" ${u==='EUR'?'selected':''}>EUR</option><option value="TWD" ${u==='TWD'?'selected':''}>TWD</option></select></td>
        <td class="s-twd">0</td>
        <td><button class="btn-del" onclick="this.parentElement.parentElement.remove();calculateBudget()">X</button></td>`;
    document.getElementById('stay-body').appendChild(row);
}

function calculateBudget() {
    const rate = parseFloat(document.getElementById('eur-rate').value) || 0;
    let totalA = 0, totalC = 0;

    document.querySelectorAll('#trans-body tr').forEach(row => {
        const a = parseFloat(row.querySelector('.t-adult').value) || 0;
        const c = parseFloat(row.querySelector('.t-child').value) || 0;
        const u = row.querySelector('.t-unit').value;
        totalA += (u === "EUR") ? a * rate : a;
        totalC += (u === "EUR") ? c * rate : c;
    });

    document.querySelectorAll('#stay-body tr').forEach(row => {
        const cost = parseFloat(row.querySelector('.s-cost').value) || 0;
        const u = row.querySelector('.s-unit').value;
        const twdPer = ((u === "EUR") ? cost * rate : cost) / 9;
        totalA += twdPer; totalC += twdPer;
        row.querySelector('.s-twd').innerText = Math.round(twdPer).toLocaleString();
    });

    document.getElementById('total-adult').innerText = "NT$ " + Math.round(totalA).toLocaleString();
    document.getElementById('total-child').innerText = "NT$ " + Math.round(totalC).toLocaleString();
}

function renderLedger() {
    const lBody = document.getElementById('ledger-body');
    lBody.innerHTML = "";
    if (cloudData.ledger) cloudData.ledger.forEach(i => addLedgerRow(i.item, i.amount, i.payer, i.participants));
    calculateLedger();
}

function addLedgerRow(item="", amount=0, payer="Vic", participants=members) {
    const row = document.createElement('tr');
    let checks = members.map(m => `<label style="margin-right:5px; display:inline-block;"><input type="checkbox" class="p-check" value="${m}" ${participants.includes(m)?'checked':''}>${m}</label>`).join("");
    row.innerHTML = `
        <td><input class="l-item" value="${item}"></td>
        <td><input type="number" class="l-amt" value="${amount}" oninput="calculateLedger()"></td>
        <td><select class="l-payer" onchange="calculateLedger()">${members.map(m => `<option value="${m}" ${payer===m?'selected':''}>${m}</option>`).join("")}</select></td>
        <td><div onchange="calculateLedger()">${checks}</div></td>
        <td><button class="btn-del" onclick="this.parentElement.parentElement.remove();calculateLedger()">X</button></td>`;
    lBody = document.getElementById('ledger-body').appendChild(row);
}

function calculateLedger() {
    let bal = {}; members.forEach(m => bal[m] = 0);
    document.querySelectorAll('#ledger-body tr').forEach(row => {
        const amt = parseFloat(row.querySelector('.l-amt').value) || 0;
        const payer = row.querySelector('.l-payer').value;
        const participants = Array.from(row.querySelectorAll('.p-check:checked')).map(cb => cb.value);
        if (amt > 0 && participants.length > 0) {
            bal[payer] += amt;
            participants.forEach(p => bal[p] -= amt / participants.length);
        }
    });
    document.getElementById('balance-summary').innerHTML = members.map(m => {
        const b = Math.round(bal[m]);
        return `<div class="balance-card"><b>${m}</b><br><span style="color:${b>=0?'#27ae60':'#e74c3c'}">${b>=0?'+':''}${b}</span></div>`;
    }).join("");
}

// --- 5. 雲端儲存 ---
function saveToCloud() {
    const pwd = prompt("輸入管理密碼：");
    if (pwd !== "2027") return;

    const data = {
        eurRate: parseFloat(document.getElementById('eur-rate').value),
        features: {},
        trans: Array.from(document.querySelectorAll('#trans-body tr')).map(r => ({
            n: r.querySelector('.t-name').value, a: parseFloat(r.querySelector('.t-adult').value),
            c: parseFloat(r.querySelector('.t-child').value), u: r.querySelector('.t-unit').value
        })),
        stay: Array.from(document.querySelectorAll('#stay-body tr')).map(r => ({
            n: r.querySelector('.s-name').value, v: parseFloat(r.querySelector('.s-cost').value), u: r.querySelector('.s-unit').value
        })),
        ledger: Array.from(document.querySelectorAll('#ledger-body tr')).map(r => ({
            item: r.querySelector('.l-item').value, amount: parseFloat(r.querySelector('.l-amt').value),
            payer: r.querySelector('.l-payer').value, participants: Array.from(r.querySelectorAll('.p-check:checked')).map(cb => cb.value)
        }))
    };
    staticItinerary.forEach((_, i) => { data.features['day'+i] = document.getElementById('feat-'+i).innerText; });

    db.ref("trip_v4").set(data).then(() => alert("✅ 儲存成功！"));
}

function showTab(id) {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

function toggleCard(el) {
    el.classList.toggle('active');
    const content = el.nextElementSibling;
    content.style.display = (content.style.display === 'block') ? 'none' : 'block';
}

loadFromCloud();
</script>
</body>
</html>
