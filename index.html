    <style>
        :root {
            --primary-blue: #2c3e50;

        }

            color: var(--text-dark);
            margin: 0;
            padding: 0;
            line-height: 1.6;

        header {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); /* 極光感漸層 */
            color: white;
            text-align: center;
            padding: 50px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .summary-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 6px solid var(--accent-blue);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .day-item {
            background: white;
            margin-bottom: 12px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 6px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }

        .day-header {
            padding: 18px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            font-weight: bold;
            font-size: 1.05em;
        }

        .day-header:hover { background-color: #f0f7ff; }
        .day-header.active { background-color: var(--accent-blue); color: white; }

        .day-content {
            display: none;
            padding: 20px;
            border-top: 1px solid #eee;
            background-color: #fff;
        }

        .section-label {
            font-weight: bold;
            color: var(--accent-blue);
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .active .section-label { color: var(--primary-blue); }

        .flight-info {
            background: #f1f3f5;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9em;
            margin: 10px 0;
            border-left: 3px solid #ced4da;
            white-space: pre-line;
        }

        .btn-group {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            background: var(--primary-blue);
            color: white;
            cursor: pointer;
            font-size: 0.85em;
        }

        button:hover { opacity: 0.9; }

        footer {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 0.85em;
        }

        .arrow { transition: transform 0.3s; }
        .active .arrow { transform: rotate(180deg); }
    </style>

// 初始化渲染行程
const itineraryContainer = document.getElementById('itinerary');

function render() {
    itineraryContainer.innerHTML = tripData.map((item, index) => `
        <div class="day-item">
            <div class="day-header" onclick="toggleDay(this)">
                <span>${item.day} ${item.title}</span>
                <span class="arrow">▼</span>
            </div>
            <div class="day-content">
                <div class="section-label">📜 行程特色</div>
                <p>${item.feature}</p>
                
                ${item.flight ? `
                    <div class="section-label">✈️ 航班資訊 / 交通</div>
                    <div class="flight-info">${item.flight}</div>
                ` : ''}

                <div class="section-label">🍽️ 餐食</div>
                <p>${item.meals}</p>

                <div class="section-label">🏨 住宿</div>
                <p>${item.hotel}</p>
            </div>
        </div>
    `).join('');
}

function toggleDay(element) {
    const content = element.nextElementSibling;
    const isActive = element.classList.contains('active');
    
    // 收合其他 (選填，若想一次開多個可註解掉)
    // document.querySelectorAll('.day-header').forEach(h => h.classList.remove('active'));
    // document.querySelectorAll('.day-content').forEach(c => c.style.display = 'none');

    if (!isActive) {
        element.classList.add('active');
        content.style.display = 'block';
    } else {
        element.classList.remove('active');
        content.style.display = 'none';
    }
}

function toggleAll(open) {
    document.querySelectorAll('.day-content').forEach(c => c.style.display = open ? 'block' : 'none');
    document.querySelectorAll('.day-header').forEach(h => {
        if (open) h.classList.add('active');
        else h.classList.remove('active');
    });
}

render();
