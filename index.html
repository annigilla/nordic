<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027 北歐親子之旅 </title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6;
            --money: #27ae60; --child: #e67e22; --danger: #ff4757;
        }

        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; color: #333; line-height: 1.6; }
        header { background: linear-gradient(135deg, #1a2a6c, #b21f1f); color: white; text-align: center; padding: 30px 10px; }
        
        .nav-tabs { display: flex; background: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-size: 1.1em; font-weight: bold; cursor: pointer; color: #777; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; display: none; }
        .container.active { display: block; }

        /* 試算設定 */
        .config-box { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 2px solid var(--accent); text-align: center; }
        .config-box input { width: 80px; padding: 8px; font-size: 1.1em; border: 1px solid #ddd; border-radius: 5px; text-align: center; color: var(--money); font-weight: bold; }

        .total-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .total-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .total-card .amount { font-size: 1.6em; font-weight: bold; display: block; margin-top: 5px; }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; margin-bottom: 10px; font-size: 0.9em; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: var(--primary); }
        .editable-input { width: 95%; padding: 6px; border: 1px solid #eee; border-radius: 4px; background: #fffcf0; font-size: 1em; }
        .btn-add { background: var(--money); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 10px 0 30px 0; font-weight: bold; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; }

        /* 行程卡片 */
        .card { background: white; margin-bottom: 12px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; }
        .card-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; align-items: center; }
        .card-header.active { background: var(--accent); color: white; }
        .card-content { display: none; padding: 20px; border-top: 1px solid #eee; background: #fff; }
        .section-title { font-weight: bold; color: var(--accent); margin-top: 12px; border-left: 4px solid var(--accent); padding-left: 10px; margin-bottom: 5px; }
        .active .section-title { color: var(--primary); border-left-color: var(--primary); }
        .info-box { background: #f1f3f5; padding: 10px; border-radius: 8px; font-size: 0.9em; margin: 10px 0; border: 1px dashed #ccc; white-space: pre-line; color: #444; }

        footer { text-align: center; padding: 40px; color: #aaa; font-size: 0.85em; }
        @media (max-width: 600px) { .total-summary { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>❄️ 2027 北歐親子之旅</h1>
    <p>芬蘭．丹麥．挪威．瑞典．塔林 </p>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('itinerary')">📅 詳細行程</button>
    <button class="tab-btn" onclick="showTab('budget')">💰 預算試算</button>
</div>

<!-- 分頁 1: 行程 -->
<div id="itinerary" class="container active">
    <div id="itinerary-list"></div>
</div>

<!-- 分頁 2: 預算 -->
<div id="budget" class="container">
    <div class="config-box">
        <label>💱 歐元匯率試算：</label>
        <input type="number" id="eur-rate" value="35.5" step="0.1" oninput="calculate()">
    </div>

    <div class="total-summary">
        <div class="total-card adult" style="border-bottom:5px solid var(--money)">
            <span style="font-size:0.9em; color:#666">大人總額 (TWD)</span>
            <span class="amount" id="total-adult">0</span>
        </div>
        <div class="total-card child" style="border-bottom:5px solid var(--child)">
            <span style="font-size:0.9em; color:#666">小孩總額 (TWD)</span>
            <span class="amount" id="total-child">0</span>
        </div>
    </div>

    <h3>✈️ 交通費用</h3>
    <table id="trans-table">
        <thead><tr><th>項目</th><th>大人</th><th>小孩</th><th>幣別</th><th></th></tr></thead>
        <tbody id="trans-body"></tbody>
    </table>
    <button class="btn-add" onclick="addRow('trans-body')">＋ 新增交通品項</button>

    <h3>🏠 住宿費用 (全團 9 人平攤)</h3>
    <table id="stay-table">
        <thead><tr><th>住宿地點</th><th>總金額</th><th>幣別</th><th>人均 (TWD)</th><th></th></tr></thead>
        <tbody id="stay-body"></tbody>
    </table>
    <button class="btn-add" onclick="addRow('stay-body')">＋ 新增住宿地點</button>
</div>

<footer>© 2027 Nordic Trip Planner</footer>

<script>
/**
 * ==========================================
 * 📝 行程編輯區 (易讀結構)
 * ==========================================
 */
const itineraryData = [
    {
        day: "第 01 天 | 01/29 (五)",
        title: "台北 (TPE) ✈️ 準備出發",
        feature: "21:00 桃園國際機場集合，飛往杜拜轉機。帶著期待的心情開啟北歐之旅！",
        transport: "",
        hotel: "機上休息"
    },
    {
        day: "第 02 天 | 01/30 (六)",
        title: "台北 ✈️ 杜拜 ✈️ 赫爾辛基 (HEL)",
        feature: "抵達後進行輕鬆的市區漫步。推薦：Oodi 圖書館（兒童閱讀區）、Esplanadi 公園散步買名牌，調整時差。",
        transport: "阿聯酋航空 EK367 台北 00:20 - 杜拜 06:15\n阿聯酋航空 EK167 杜拜 08:40 - 赫爾辛基 14:05",
        hotel: "赫爾辛基 (Helsinki) Airbnb"
    },
    {
        day: "第 03 天 | 01/31 (日)",
        title: "赫爾辛基【市區觀光】",
        feature: "參觀宏偉的主教座堂、富有俄羅斯風情的烏斯佩斯基大教堂，以及奇特的岩石教堂。",
        transport: "",
        hotel: "赫爾辛基 (Helsinki) Airbnb"
    },
    {
        day: "第 04 天 | 02/01 (一)",
        title: "赫爾辛基 🚢 塔林 (愛沙尼亞) 一日遊",
        feature: "搭乘渡輪前往愛沙尼亞首都。漫步於世界文化遺產——塔林舊城區，體驗中世紀童話氛圍。",
        transport: "跨國渡輪 (當日往返時間再補)",
        hotel: "赫爾辛基 (Helsinki) Airbnb"
    },
    {
        day: "第 05 天 | 02/02 (二)",
        title: "赫爾辛基 🚂 (夜鋪火車) 往羅瓦涅米",
        feature: "白天市區自由活動。晚間搭乘「極光特快車」夜鋪火車，讓小朋友體驗睡在火車上的樂趣！",
        transport: "VR 極地夜鋪火車 (19:29 發車)",
        hotel: "舒適夜鋪火車 (兩人一室套房)"
    },
    {
        day: "第 06-10 天 | 02/03 - 02/07",
        title: "羅瓦涅米【聖誕老人與極光】",
        feature: "跨越北極圈、拜訪聖誕老人、哈士奇與馴鹿雪橇體驗。晚間留意極光預報。",
        transport: "07:20 抵達羅瓦涅米",
        hotel: "Santa Claus Holiday Village"
    },
    {
        day: "第 11-12 天 | 02/08 - 02/09",
        title: "哥本哈根 (CPH) 童話觀光",
        feature: "飛往丹麥。尋找小美人魚、繽紛新港 (Nyhavn) 拍照。參觀圓塔與 Tivoli 樂園。",
        transport: "芬蘭航空 AY532 (09:10-10:25)\n芬蘭航空 AY957 (11:35-12:15)",
        hotel: "哥本哈根 (Copenhagen) Airbnb"
    },
    {
        day: "第 13 天 | 02/10 (三)",
        title: "哥本哈根 🚢 (過夜郵輪) 往奧斯陸",
        feature: "傍晚登上豪華郵輪 DFDS。船上享用大餐、欣賞海景，移動中享受舒適睡眠。",
        transport: "DFDS 豪華郵輪 (預計 16:30 開船)",
        hotel: "郵輪艙房"
    },
    {
        day: "第 14-15 天 | 02/11 - 02/12",
        title: "奧斯陸 / 斯德哥爾摩",
        feature: "奧斯陸歌劇院漫步。隨後飛往斯德哥爾摩，參觀 Vasa 沉船博物館與老城區。",
        transport: "挪威航空 DY816 (15:00-16:00)",
        hotel: "斯德哥爾摩 (Stockholm) Airbnb"
    },
    {
        day: "第 16-17 天 | 02/13 - 02/14",
        title: "歸途 (瑞典 ✈️ 台北)",
        feature: "經杜拜轉機返回台北。帶著滿滿的回憶與極光照片回到溫暖的家。",
        transport: "阿聯酋航空 EK158 / EK366",
        hotel: "Sweet Home"
    }
];

/**
 * ==========================================
 * 💰 初始預算資料 (交通與住宿)
 * ==========================================
 */
const initialTrans = [
    { name: "國際機票 (Emirates)", adult: 42142, child: 33714, unit: "TWD" },
    { name: "內陸航段 (2段)", adult: 11627, child: 9226, unit: "TWD" },
    { name: "極地火車", adult: 121.5, child: 121.5, unit: "EUR" },
    { name: "DFDS 郵輪", adult: 100, child: 100, unit: "EUR" }
];

const initialStay = [
    { name: "Santa Claus Village", cost: 2495*3, unit: "EUR" }, 
    { name: "Helsinki Airbnb", cost: 150, unit: "EUR" },
    { name: "Stockholm Airbnb", cost: 3500, unit: "TWD" },
    { name: "Copenhagen Airbnb", cost: 100, unit: "EUR" }
];

/**
 * ==========================================
 * ⚙️ 核心處理邏輯
 * ==========================================
 */

function renderItinerary() {
    const list = document.getElementById('itinerary-list');
    itineraryData.forEach(item => {
        list.innerHTML += `
            <div class="card">
                <div class="card-header" onclick="toggleCard(this)">
                    <span>${item.day} ${item.title}</span>
                    <span>▼</span>
                </div>
                <div class="card-content">
                    <div class="section-title">📜 行程特色</div>
                    <p>${item.feature}</p>
                    ${item.transport ? `<div class="section-title">✈️ 航班/交通</div><div class="info-box">${item.transport}</div>` : ''}
                    ${item.hotel ? `<div class="section-title">🏨 住宿預定</div><p>${item.hotel}</p>` : ''}
                </div>
            </div>`;
    });
}

function initBudget() {
    initialTrans.forEach(i => addRow('trans-body', i.name, i.adult, i.child, i.unit));
    initialStay.forEach(i => addRow('stay-body', i.name, i.cost, 0, i.unit));
    calculate();
}

function addRow(target, name="", val1=0, val2=0, unit="TWD") {
    const body = document.getElementById(target);
    const row = document.createElement('tr');
    if (target === 'trans-body') {
        row.innerHTML = `
            <td><input class="editable-input" value="${name}"></td>
            <td><input type="number" class="editable-input t-adult" value="${val1}" oninput="calculate()"></td>
            <td><input type="number" class="editable-input t-child" value="${val2}" oninput="calculate()"></td>
            <td><select class="t-unit" onchange="calculate()"><option value="TWD" ${unit==='TWD'?'selected':''}>TWD</option><option value="EUR" ${unit==='EUR'?'selected':''}>EUR</option></select></td>
            <td><button class="btn-del" onclick="this.parentElement.parentElement.remove();calculate()">X</button></td>`;
    } else {
        row.innerHTML = `
            <td><input class="editable-input" value="${name}"></td>
            <td><input type="number" class="editable-input s-cost" value="${val1}" oninput="calculate()"></td>
            <td><select class="s-unit" onchange="calculate()"><option value="TWD" ${unit==='TWD'?'selected':''}>TWD</option><option value="EUR" ${unit==='EUR'?'selected':''}>EUR</option></select></td>
            <td class="s-twd">0</td>
            <td><button class="btn-del" onclick="this.parentElement.parentElement.remove();calculate()">X</button></td>`;
    }
    body.appendChild(row);
}

function calculate() {
    const rate = parseFloat(document.getElementById('eur-rate').value) || 0;
    let sumA = 0, sumC = 0;

    // 計算交通
    document.querySelectorAll('#trans-body tr').forEach(row => {
        const a = parseFloat(row.querySelector('.t-adult').value) || 0;
        const c = parseFloat(row.querySelector('.t-child').value) || 0;
        const u = row.querySelector('.t-unit').value;
        if (u === "EUR") { sumA += a * rate; sumC += c * rate; } else { sumA += a; sumC += c; }
    });

    // 計算住宿 (全團 9 人平攤)
    document.querySelectorAll('#stay-body tr').forEach(row => {
        const totalCost = parseFloat(row.querySelector('.s-cost').value) || 0;
        const u = row.querySelector('.s-unit').value;
        const totalTwd = (u === "EUR") ? totalCost * rate : totalCost;
        const perPerson = totalTwd / 9;
        sumA += perPerson; sumC += perPerson;
        row.querySelector('.s-twd').innerText = Math.round(perPerson).toLocaleString();
    });

    document.getElementById('total-adult').innerText = Math.round(sumA).toLocaleString();
    document.getElementById('total-child').innerText = Math.round(sumC).toLocaleString();
}

function showTab(id) {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

function toggleCard(el) {
    el.classList.toggle('active');
    const content = el.nextElementSibling;
    content.style.display = (content.style.display === 'block') ? 'none' : 'block';
}

renderItinerary();
initBudget();
</script>
</body>
</html>
